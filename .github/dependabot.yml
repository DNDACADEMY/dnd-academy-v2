version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Seoul"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
    commit-message:
      prefix: "chore"
      prefix-development: "chore"
      include: "scope"
    groups:
      # devDependencies는 메이저 포함 한 PR로 묶는다. 런타임 번들에 영향이
      # 없어 무더기로 열리는 것만 막으면 충분하다.
      development-dependencies:
        dependency-type: "development"
      # 런타임 의존성은 minor/patch만 묶는다. 메이저는 개별 PR로 남겨
      # (react-query 등) 동작 검증 후 단독 머지하도록 한다.
      production-dependencies:
        dependency-type: "production"
        update-types:
          - "minor"
          - "patch"
    ignore:
      # next-upgrade.test.ts 가드레일이 next / @next/* 를 정확한 버전(16.2.x)으로
      # 핀 고정한다. patch 까지 포함해 모든 자동 업데이트를 막고, 올릴 때는
      # 가드레일 테스트를 함께 갱신하며 수동으로 진행한다.
      - dependency-name: "next"
      - dependency-name: "@next/*"
      - dependency-name: "react"
        update-types: ["version-update:semver-major"]
      - dependency-name: "react-dom"
        update-types: ["version-update:semver-major"]
      # Storybook 계열도 동일하게 가드레일이 정확한 버전(10.4.x)으로 핀 고정한다.
      # `@storybook/*` glob 은 형제 패키지(storybook / eslint-plugin-storybook /
      # @chromatic-com/storybook)를 매칭하지 못하므로 개별로 함께 막는다.
      - dependency-name: "@storybook/*"
      - dependency-name: "storybook"
      - dependency-name: "eslint-plugin-storybook"
      - dependency-name: "@chromatic-com/storybook"
      - dependency-name: "cypress"
        update-types: ["version-update:semver-major"]
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]
      # Bumping react-pdf 9 -> 10 reintroduces a runtime crash on /projects/[id]
      # (pdfjs-dist 5.x + Next.js's bundled webpack 5.98.0, see PR #370 revert).
      # tsc + lint do not catch it. Remove once Next.js bundles webpack >= 5.103.0.
      - dependency-name: "react-pdf"
        update-types: ["version-update:semver-major"]
      # webpack is exact-pinned via root resolutions to match Next.js's bundled
      # version; any dependabot bump is a silent no-op (manifest changes only).
      - dependency-name: "webpack"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Seoul"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "ci"
    commit-message:
      prefix: "chore(ci)"
