version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Seoul"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
    commit-message:
      prefix: "chore"
      prefix-development: "chore"
      include: "scope"
    groups:
      types:
        patterns:
          - "@types/*"
      eslint:
        patterns:
          - "eslint"
          - "eslint-*"
          - "@typescript-eslint/*"
      stylelint:
        patterns:
          - "stylelint"
          - "stylelint-*"
      testing:
        patterns:
          - "jest"
          - "jest-*"
          - "@testing-library/*"
      storybook:
        patterns:
          - "storybook"
          - "@storybook/*"
        update-types:
          - "patch"
          - "minor"
    ignore:
      - dependency-name: "next"
        update-types: ["version-update:semver-major"]
      - dependency-name: "react"
        update-types: ["version-update:semver-major"]
      - dependency-name: "react-dom"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@storybook/*"
        update-types: ["version-update:semver-major"]
      # `@storybook/*` glob does not match the bare `storybook` meta-package.
      - dependency-name: "storybook"
        update-types: ["version-update:semver-major"]
      - dependency-name: "cypress"
        update-types: ["version-update:semver-major"]
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]
      # Bumping react-pdf 9 -> 10 reintroduces a runtime crash on /projects/[id]
      # (pdfjs-dist 5.x + Next.js's bundled webpack 5.98.0, see PR #370 revert).
      # tsc + lint do not catch it. Remove once Next.js bundles webpack >= 5.103.0.
      - dependency-name: "react-pdf"
        update-types: ["version-update:semver-major"]
      # webpack is exact-pinned via root resolutions to match Next.js's bundled
      # version; any dependabot bump is a silent no-op (manifest changes only).
      - dependency-name: "webpack"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Seoul"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "ci"
    commit-message:
      prefix: "chore(ci)"
