compressionLevel: mixed

defaultSemverRangePrefix: ""

enableGlobalCache: false

nodeLinker: node-modules

packageExtensions:
  "@commitlint/load@*":
    dependencies:
      "@types/node": 25.9.1
      typescript: 5.2.2
  "@oxc-resolver/binding-wasm32-wasi@*":
    dependencies:
      "@emnapi/core": 1.9.2
      "@emnapi/runtime": 1.9.2
  eslint-plugin-testing-library@*:
    dependencies:
      typescript: 5.2.2
  vite-plugin-dts@*:
    dependencies:
      typescript: 5.2.2
  storybook@*:
    dependencies:
      "@testing-library/dom": 10.4.1
      react: 19.2.6
      react-dom: 19.2.6
  eslint-plugin-storybook@*:
    dependencies:
      typescript: 5.2.2
  motion@*:
    dependencies:
      "@emotion/is-prop-valid": 1.4.0
  react-dom@*:
    dependencies:
      "@types/react-dom": 19.0.2
  react@*:
    dependencies:
      "@types/react": 19.0.1

yarnPath: .yarn/releases/yarn-4.6.0.cjs
